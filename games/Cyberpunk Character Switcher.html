<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Interactive Cyberpunk Character</title>
    <style>
        :root {
            --lookX: 0; 
            --lookY: 0; 
            
            --skin-base: #1a5b6e;
            --skin-shadow: #0d3240;
            --hair-dark: #071d2b;
            --hair-light: #165a72;
            --glasses-glow: #00ff44;
            --glasses-fill: rgba(0, 255, 100, 0.25); 
            --lips: #8a0b29;
            --moon: #fdfae4;
            --jacket: #2b3a2b;
            --skin-highlight: #2a819e;
            --tattoo-glow: #00ffff;
            --hair-highlight: #2288aa;
            --iris-color: #00ffcc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #050811;
            height: 100vh; /* Fallback */
            height: 100dvh; /* Dynamic viewport height to prevent mobile browser bars hiding buttons */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: sans-serif;
            color: white;
            touch-action: none; 
        }

        .instructions {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6); padding: 10px 20px; border-radius: 20px;
            border: 1px solid rgba(0, 255, 68, 0.3); text-shadow: 0 0 5px var(--glasses-glow);
            z-index: 100; pointer-events: none; letter-spacing: 1px; text-align: center;
            line-height: 1.4; width: 90%; max-width: 380px; font-size: 14px;
        }

        .controls-panel {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; flex-wrap: wrap; gap: 10px; z-index: 1000; width: 95%; max-width: 480px;
            justify-content: space-between;
        }
        
        .control-group {
            display: flex; align-items: center; justify-content: space-between; flex: 1;
            background: rgba(0, 20, 10, 0.75); border: 1px solid var(--glasses-glow);
            padding: 6px 8px; border-radius: 12px; box-shadow: 0 0 10px rgba(0, 255, 68, 0.2);
            backdrop-filter: blur(5px);
        }

        .control-group span { color: var(--glasses-glow); font-size: 11px; font-weight: bold; letter-spacing: 1px; text-shadow: 0 0 5px var(--glasses-glow); }
        .control-group button {
            background: #020810; color: #00ffcc; border: 1px solid #00ffcc; border-radius: 6px;
            width: 30px; height: 30px; font-size: 14px; font-weight: bold; cursor: pointer;
            box-shadow: inset 0 0 5px rgba(0, 255, 204, 0.2); transition: all 0.1s;
            display: flex; align-items: center; justify-content: center; user-select: none;
        }
        .control-group button:active { background: #00ffcc; color: #000; box-shadow: 0 0 15px #00ffcc; transform: scale(0.95); }

        .spin-toggle {
            flex: 1 1 100%; background: #020810; color: #ffaa00; border: 1px solid #ffaa00; border-radius: 12px;
            padding: 10px 15px; font-size: 14px; font-weight: bold; cursor: pointer;
            box-shadow: inset 0 0 10px rgba(255, 170, 0, 0.2); transition: all 0.2s;
            display: flex; align-items: center; justify-content: center; letter-spacing: 2px;
        }
        .spin-toggle:active:not(:disabled) { background: #ffaa00; color: #000; box-shadow: 0 0 20px #ffaa00; transform: scale(0.98); }
        .spin-toggle:disabled { opacity: 0.5; filter: grayscale(1); cursor: not-allowed; }

        .scene-container { display: flex; justify-content: center; align-items: center; width: 100%; height: 100%; }
        .scene { position: relative; width: 400px; height: 500px; perspective: 1000px; transform-style: preserve-3d; transition: transform 0.3s ease; }

        /* Updated Media Queries for Modern Phones (like Pixel 9) */
        @media (max-width: 600px) { 
            .scene { transform: scale(0.75); } 
            .instructions { font-size: 11px; top: 10px; padding: 6px 12px; width: 95%; } 
            .controls-panel { flex-wrap: wrap; justify-content: center; bottom: 15px; gap: 8px; width: 96%; } 
            .control-group { padding: 6px 8px; min-width: 47%; flex: 1 1 47%; } 
            .control-group span { font-size: 10px; }
            .control-group button { width: 28px; height: 28px; }
            .spin-toggle { padding: 8px 10px; font-size: 13px; }
        }
        @media (max-height: 750px) { 
            .scene { transform: scale(0.65); } 
            .controls-panel { bottom: 8px; }
        }

        .layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; transform-style: preserve-3d; will-change: transform; }

        /* 1. Background */
        .layer-bg { transform: translateZ(-100px) translateX(calc(var(--lookX) * -8px)) rotateY(calc(var(--lookX) * -5deg)) scale(1.2); background: radial-gradient(circle at center, #091a28 0%, #02050a 100%); border-radius: 10px; overflow: hidden; }
        .neon-pillar-1 { position: absolute; left: 10%; top: -10%; width: 45px; height: 120%; background: #020810; border-right: 2px solid #00ffaa; box-shadow: 4px 0 25px rgba(0, 255, 170, 0.4); }
        .neon-pillar-2 { position: absolute; right: 5%; top: -10%; width: 60px; height: 120%; background: #020810; border-left: 2px solid #ff0055; box-shadow: -4px 0 25px rgba(255, 0, 85, 0.4); }
        .cyber-sign { position: absolute; right: 15%; top: 15%; color: #00ffcc; font-size: 20px; font-weight: bold; font-family: sans-serif; writing-mode: vertical-rl; text-shadow: 0 0 8px #00ffcc, 0 0 15px #00ffcc; border: 2px solid #00ffcc; padding: 12px 6px; background: rgba(0, 25, 20, 0.7); border-radius: 4px; box-shadow: inset 0 0 10px #00ffcc, 0 0 15px rgba(0, 255, 204, 0.3); }
        .bokeh-light { position: absolute; border-radius: 50%; filter: blur(20px); opacity: 0.6; animation: pulse 4s infinite alternate ease-in-out; }
        .b-cyan { width: 80px; height: 80px; top: 25%; left: 25%; background: #00ffff; }
        .b-pink { width: 120px; height: 120px; bottom: 25%; right: 25%; background: #ff00aa; animation-delay: -2s; }
        .b-purple { width: 90px; height: 90px; top: 60%; left: 15%; background: #aa00ff; animation-delay: -1s;}
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.4; } 100% { transform: scale(1.4); opacity: 0.7; } }
        .grid-floor { position: absolute; bottom: 0; left: -50%; width: 200%; height: 35%; background-image: linear-gradient(rgba(255, 0, 85, 0.4) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 0, 85, 0.4) 1px, transparent 1px); background-size: 20px 20px; transform: perspective(300px) rotateX(70deg) translateY(20px); mask-image: linear-gradient(to top, black, transparent); -webkit-mask-image: linear-gradient(to top, black, transparent); }

        /* 3. Base Head & Body */
        .layer-head { transform: translateZ(20px) translateX(calc(var(--lookX) * 5px)) rotateY(calc(var(--lookX) * 15deg)); }
        .jacket { position: absolute; width: 340px; height: 160px; bottom: -20px; border-radius: 35% 35% 0 0; border: 2px solid #112211; background: repeating-linear-gradient(45deg, rgba(0,0,0,0.3) 0px, rgba(0,0,0,0.3) 2px, transparent 2px, transparent 5px), repeating-linear-gradient(-45deg, rgba(0,0,0,0.3) 0px, rgba(0,0,0,0.3) 2px, transparent 2px, transparent 5px), linear-gradient(180deg, #1f2a1f, var(--jacket)); box-shadow: inset 0 30px 40px rgba(0,0,0,0.9), 0 -5px 15px rgba(0,0,0,0.5); }
        .jacket-collar { position: absolute; width: 100px; height: 110px; background: linear-gradient(135deg, #111, #222); top: -40px; border-radius: 10px; border: 2px solid #334433; box-shadow: inset 0 0 15px rgba(0,0,0,0.8), 0 10px 20px rgba(0,0,0,0.9); }
        .jacket-collar.left { left: 70px; transform: rotate(-20deg); border-right: 2px solid var(--glasses-glow); }
        .jacket-collar.right { right: 70px; transform: rotate(20deg); border-left: 2px solid var(--glasses-glow); }
        .neck { position: absolute; width: 65px; height: 90px; background: linear-gradient(to right, var(--skin-shadow), var(--skin-base), var(--skin-shadow)); bottom: 110px; border-radius: 10px; box-shadow: inset 0 30px 20px rgba(0,0,0,0.6); }
        .cyber-wire { position: absolute; width: 40px; height: 4px; background: #111; border-top: 1px solid #555; top: 40px; left: 12px; border-radius: 2px; box-shadow: 0 5px 5px rgba(0,0,0,0.5); }
        .ear { position: absolute; width: 30px; height: 55px; background: linear-gradient(135deg, var(--skin-base), var(--skin-shadow)); top: 205px; border-radius: 50%; border-left: 2px solid rgba(255,255,255,0.1); box-shadow: inset -5px -5px 10px rgba(0,0,0,0.5); }
        .ear.left { left: 95px; transform: rotate(-15deg); } .ear.right { right: 95px; transform: rotate(15deg); }
        .ear-detail { position: absolute; width: 12px; height: 25px; border-radius: 50%; border: 2px solid rgba(0,0,0,0.2); border-left: 2px solid rgba(255,255,255,0.1); top: 10px; left: 8px; }
        .earring { position: absolute; width: 8px; height: 8px; background: #ffaa00; border-radius: 50%; bottom: 5px; left: 8px; box-shadow: 0 0 8px #ffaa00; }
        .earring.e2 { bottom: 18px; left: 3px; width: 5px; height: 5px; }
        .face-base { position: absolute; width: 160px; height: 230px; background: radial-gradient(circle at 40% 30%, var(--skin-highlight) 0%, var(--skin-base) 40%, var(--skin-shadow) 100%); top: 110px; border-radius: 40% 40% 50% 50% / 30% 30% 65% 65%; box-shadow: inset -15px -25px 40px rgba(0,0,0,0.8), inset 8px 8px 15px rgba(255,255,255,0.2), 0 15px 20px rgba(0,0,0,0.5); }
        .contour { position: absolute; border-radius: 50%; background: rgba(0,0,0,0.2); filter: blur(8px); }
        .contour.left { width: 20px; height: 70px; left: 15px; top: 110px; } .contour.right { width: 20px; height: 70px; right: 15px; top: 110px; }
        .chin-highlight { position: absolute; width: 40px; height: 15px; bottom: 15px; left: 60px; background: rgba(255,255,255,0.1); border-radius: 50%; filter: blur(3px); }
        .face-tattoo { position: absolute; top: 85px; left: 25px; width: 20px; height: 35px; background: repeating-linear-gradient(0deg, var(--tattoo-glow) 0px, var(--tattoo-glow) 2px, transparent 2px, transparent 6px); clip-path: polygon(0 0, 100% 20%, 80% 100%, 20% 80%); opacity: 0.75; box-shadow: 0 0 10px var(--tattoo-glow); transform: rotate(-15deg); }

        /* 4. Facial Features */
        .layer-features { transform: translateZ(28px) translateX(calc(var(--lookX) * 15px)) translateY(calc(var(--lookY) * 5px)) rotateY(calc(var(--lookX) * 22deg)); }
        .nose { position: absolute; width: 12px; height: 35px; background: linear-gradient(to right, rgba(255,255,255,0.25), transparent, rgba(0,0,0,0.2)); top: 235px; border-radius: 10px 10px 5px 5px; box-shadow: -4px 0 10px rgba(0,0,0,0.15); }
        .nostril { position: absolute; width: 6px; height: 6px; background: rgba(0,0,0,0.4); border-radius: 50%; bottom: -2px; }
        .nostril.left { left: -4px; } .nostril.right { right: -4px; }
        .lips { position: absolute; width: 46px; height: 22px; top: 283px; filter: drop-shadow(0 4px 4px rgba(0,0,0,0.5)); }
        .lip-top-left, .lip-top-right { position: absolute; width: 23px; height: 10px; background: linear-gradient(to bottom, #d6244c, #800a26); top: 0; box-shadow: inset 0 2px 3px rgba(255,255,255,0.25); }
        .lip-top-left { left: 0; border-radius: 12px 8px 2px 10px; transform-origin: right bottom; transform: rotate(10deg); }
        .lip-top-right { right: 0; border-radius: 8px 12px 10px 2px; transform-origin: left bottom; transform: rotate(-10deg); }
        .lip-bottom { position: absolute; width: 40px; height: 12px; background: linear-gradient(to bottom, #500315, var(--lips)); bottom: 0; left: 3px; border-radius: 4px 4px 20px 20px; box-shadow: inset 0 -2px 6px rgba(0,0,0,0.7); }
        .lip-bottom::after { content: ''; position: absolute; width: 18px; height: 4px; background: rgba(255,255,255,0.35); border-radius: 50%; top: 4px; left: 11px; filter: blur(1px); }
        .mouth-line { position: absolute; width: 48px; height: 4px; background: #1a0005; top: 8px; left: -1px; border-radius: 50%; box-shadow: 0 1px 1px rgba(255,255,255,0.15); }

        /* 4.5. Eyes */
        .layer-eyes { transform: translateZ(26px) translateX(calc(var(--lookX) * 12px)) translateY(calc(var(--lookY) * 5px)) rotateY(calc(var(--lookX) * 20deg)); }
        .eye-container { position: absolute; display: flex; transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .eye { position: relative; background: #e6e6e6; overflow: hidden; transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .iris, .pupil, .eyelid { transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .iris { transform: translateX(calc(var(--lookX) * 8px)) translateY(calc(var(--lookY) * 3px)); }

        /* Eye Styles 1-10 */
        .eye-container[data-style="1"] { top: 195px; gap: 40px; }
        .eye-container[data-style="1"] .eye { width: 60px; height: 28px; box-shadow: inset 0 8px 12px rgba(0,0,0,0.6), 0 0 10px rgba(0,255,200,0.2); border-top: 4px solid #111; border-bottom: 2px solid #222; }
        .eye-container[data-style="1"] .eye.left { transform: rotate(-5deg); border-radius: 80% 20% 70% 30% / 70% 30% 80% 20%; }
        .eye-container[data-style="1"] .eye.right { transform: rotate(5deg); border-radius: 20% 80% 30% 70% / 30% 70% 20% 80%; }
        .eye-container[data-style="1"] .iris { width: 26px; height: 26px; background: radial-gradient(circle, var(--iris-color) 30%, #007766 100%); border-radius: 50%; position: absolute; top: -2px; left: 17px; box-shadow: inset 0 0 6px rgba(0,0,0,0.8); }
        .eye-container[data-style="1"] .pupil { width: 10px; height: 10px; background: #000; border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }

        .eye-container[data-style="2"] { top: 195px; gap: 65px; }
        .eye-container[data-style="2"] .eye { width: 55px; height: 26px; box-shadow: inset 0 8px 10px rgba(0,0,0,0.5); border-top: 3px solid #111; border-bottom: 2px solid #222; }
        .eye-container[data-style="2"] .eye.left { transform: rotate(-2deg); border-radius: 70% 30% 60% 40% / 60% 40% 70% 30%; }
        .eye-container[data-style="2"] .eye.right { transform: rotate(2deg); border-radius: 30% 70% 40% 60% / 40% 60% 30% 70%; }
        .eye-container[data-style="2"] .iris { width: 24px; height: 24px; background: radial-gradient(circle, #00eeff 30%, #005577 100%); border-radius: 50%; position: absolute; top: 0px; left: 15px; }
        .eye-container[data-style="2"] .pupil { width: 8px; height: 8px; background: #000; border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }

        .eye-container[data-style="3"] { top: 185px; gap: 45px; }
        .eye-container[data-style="3"] .eye { width: 65px; height: 24px; border-top: 5px solid #000; border-bottom: 1px solid #333; }
        .eye-container[data-style="3"] .eye.left { transform: rotate(-15deg); border-radius: 80% 0% 80% 20% / 80% 20% 80% 0%; }
        .eye-container[data-style="3"] .eye.right { transform: rotate(15deg); border-radius: 0% 80% 20% 80% / 20% 80% 0% 80%; }
        .eye-container[data-style="3"] .iris { width: 22px; height: 22px; background: radial-gradient(circle, #ff00aa 30%, #550055 100%); border-radius: 50%; position: absolute; top: -1px; left: 21px; }
        .eye-container[data-style="3"] .pupil { width: 8px; height: 8px; background: #000; border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }

        .eye-container[data-style="4"] { top: 205px; gap: 40px; }
        .eye-container[data-style="4"] .eye { width: 55px; height: 30px; border-top: 2px solid #222; border-bottom: 5px solid #000; }
        .eye-container[data-style="4"] .eye.left { transform: rotate(8deg); border-radius: 30% 70% 40% 60% / 40% 60% 30% 70%; }
        .eye-container[data-style="4"] .eye.right { transform: rotate(-8deg); border-radius: 70% 30% 60% 40% / 60% 40% 70% 30%; }
        .eye-container[data-style="4"] .iris { width: 26px; height: 26px; background: radial-gradient(circle, #55ff00 30%, #115500 100%); border-radius: 50%; position: absolute; top: 2px; left: 14px; }
        .eye-container[data-style="4"] .pupil { width: 12px; height: 12px; background: #000; border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }

        .eye-container[data-style="5"] { top: 185px; gap: 35px; }
        .eye-container[data-style="5"] .eye { width: 60px; height: 45px; border-top: 6px solid #111; border-bottom: 2px solid #222; }
        .eye-container[data-style="5"] .eye.left { transform: rotate(-3deg); border-radius: 50% 50% 40% 40%; }
        .eye-container[data-style="5"] .eye.right { transform: rotate(3deg); border-radius: 50% 50% 40% 40%; }
        .eye-container[data-style="5"] .iris { width: 36px; height: 36px; background: radial-gradient(circle, #aa00ff 30%, #330055 100%); border-radius: 50%; position: absolute; top: 2px; left: 12px; }
        .eye-container[data-style="5"] .pupil { width: 14px; height: 20px; background: #000; border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }

        .eye-container[data-style="6"] { top: 198px; gap: 45px; }
        .eye-container[data-style="6"] .eye { width: 60px; height: 14px; border-top: 4px solid #000; border-bottom: 3px solid #111; }
        .eye-container[data-style="6"] .eye.left { transform: rotate(-6deg); border-radius: 80% 20% 70% 30% / 70% 30% 80% 20%; }
        .eye-container[data-style="6"] .eye.right { transform: rotate(6deg); border-radius: 20% 80% 30% 70% / 30% 70% 20% 80%; }
        .eye-container[data-style="6"] .iris { width: 20px; height: 20px; background: radial-gradient(circle, #fff 30%, #888 100%); border-radius: 50%; position: absolute; top: -4px; left: 20px; }
        .eye-container[data-style="6"] .pupil { width: 6px; height: 6px; background: #000; border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }

        .eye-container[data-style="7"] { top: 195px; gap: 40px; }
        .eye-container[data-style="7"] .eye { width: 50px; height: 25px; background: #050505; border: 2px solid #ff0055; box-shadow: 0 0 15px rgba(255,0,85,0.6); border-radius: 4px; }
        .eye-container[data-style="7"] .eye.left { transform: rotate(0deg); }
        .eye-container[data-style="7"] .eye.right { transform: rotate(0deg); }
        .eye-container[data-style="7"] .iris { width: 22px; height: 22px; background: radial-gradient(circle, #ff0055, #440011); border-radius: 4px; position: absolute; top: 0px; left: 14px; box-shadow: 0 0 10px #ff0055; }
        .eye-container[data-style="7"] .pupil { width: 6px; height: 14px; background: #fff; border-radius: 2px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }

        .eye-container[data-style="8"] { top: 190px; gap: 45px; }
        .eye-container[data-style="8"] .eye { width: 55px; height: 32px; border-top: 5px solid #000; border-bottom: 2px solid #222; }
        .eye-container[data-style="8"] .eye.left { transform: rotate(-22deg); border-radius: 0% 100% 0% 100% / 0% 100% 0% 100%; }
        .eye-container[data-style="8"] .eye.right { transform: rotate(22deg); border-radius: 100% 0% 100% 0% / 100% 0% 100% 0%; }
        .eye-container[data-style="8"] .iris { width: 28px; height: 28px; background: radial-gradient(circle, #ffcc00, #aa5500); border-radius: 50%; position: absolute; top: 0px; left: 13px; }
        .eye-container[data-style="8"] .pupil { width: 4px; height: 22px; background: #000; border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }

        .eye-container[data-style="9"] { top: 195px; gap: 40px; }
        .eye-container[data-style="9"] .eye.left { width: 65px; height: 35px; transform: rotate(-8deg); top: -5px; border-radius: 80% 20% 70% 30% / 70% 30% 80% 20%; border-top: 4px solid #111; }
        .eye-container[data-style="9"] .eye.right { width: 45px; height: 18px; transform: rotate(15deg); top: 8px; border-radius: 20% 80% 30% 70% / 30% 70% 20% 80%; border-top: 2px solid #111; }
        .eye-container[data-style="9"] .eye.left .iris { width: 30px; height: 30px; background: radial-gradient(circle, #00ffff, #004444); border-radius: 50%; position: absolute; top: 0px; left: 17px; }
        .eye-container[data-style="9"] .eye.right .iris { width: 16px; height: 16px; background: radial-gradient(circle, #ff00ff, #440044); border-radius: 50%; position: absolute; top: 0px; left: 14px; }
        .eye-container[data-style="9"] .eye.left .pupil { width: 12px; height: 12px; background: #000; border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .eye-container[data-style="9"] .eye.right .pupil { width: 6px; height: 6px; background: #000; border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }

        .eye-container[data-style="10"] { top: 195px; gap: 28px; }
        .eye-container[data-style="10"] .eye { width: 55px; height: 25px; box-shadow: inset 0 15px 15px rgba(0,0,0,0.95); border-top: 6px solid #050505; border-bottom: 1px solid #111; }
        .eye-container[data-style="10"] .eye.left { transform: rotate(-3deg); border-radius: 60% 40% 70% 30% / 70% 30% 80% 20%; }
        .eye-container[data-style="10"] .eye.right { transform: rotate(3deg); border-radius: 40% 60% 30% 70% / 30% 70% 20% 80%; }
        .eye-container[data-style="10"] .iris { width: 24px; height: 24px; background: radial-gradient(circle, #55aaff, #003366); border-radius: 50%; position: absolute; top: 0px; left: 15px; box-shadow: inset 0 6px 10px rgba(0,0,0,0.8); }
        .eye-container[data-style="10"] .pupil { width: 8px; height: 8px; background: #000; border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }

        /* NEW Eye Styles 11-20 */
        /* 11: Abyssal Void */
        .eye-container[data-style="11"] { top: 195px; gap: 40px; }
        .eye-container[data-style="11"] .eye { width: 60px; height: 28px; background: #000; box-shadow: inset 0 0 20px #4400aa, 0 0 15px #6600ff; border: 2px solid #330088; border-radius: 80% 20% 70% 30% / 70% 30% 80% 20%; }

        #character-scene[data-outfit="19"] .jacket { background: #330055; border-color: gold; }

        #character-scene[data-outfit="19"] .jacket-detail-2 { width: 60px; height: 60px; background: transparent; border: 2px solid gold; border-radius: 50%; left: 140px; top: 30px; }

        /* 20: Deep Space */
        #character-scene[data-outfit="20"] .jacket { background: #eef; border-radius: 80px 80px 0 0; border: 6px solid #bbc; width: 400px; left: -30px; }
        #character-scene[data-outfit="20"] .jacket-collar { background: #0055ff; border-radius: 20px; width: 140px; height: 60px; top: -20px; left: 100px; transform: none; border: 4px solid #0022aa; }
        #character-scene[data-outfit="20"] .jacket-collar.right { opacity: 0; }
        #character-scene[data-outfit="20"] .jacket-detail-1 { width: 30px; height: 30px; background: radial-gradient(circle, #ff0055, #aa0000); border-radius: 50%; top: 60px; left: 80px; border: 4px solid #333; }
        #character-scene[data-outfit="20"] .jacket-detail-2 { width: 30px; height: 30px; background: radial-gradient(circle, #00aaff, #0044aa); border-radius: 50%; top: 60px; left: 120px; border: 4px solid #333; }

    </style>
</head>
<body>

    <div class="instructions">
        Swipe screen or drag mouse to move head!<br>
        <small style="color:#aaa;">(Keys: Z/X Har, C/V Gls, B/N Out, 1-0 Eye)</small>
    </div>
    
    <div class="scene-container">
        <div class="scene" id="character-scene" data-hairstyle="1" data-outfit="1">
            
            <!-- Background Layer -->
            <div class="layer layer-bg">
                <div class="grid-floor"></div>
                <div class="bokeh-light b-cyan"></div>
                <div class="bokeh-light b-pink"></div>
                <div class="bokeh-light b-purple"></div>
                <div class="neon-pillar-1"></div>
                <div class="neon-pillar-2"></div>
                <div class="cyber-sign">電脳都市</div>
            </div>

            <!-- Back Hair -->
            <div class="layer layer-hair-back">
                <div class="hair-back-shape"></div>
            </div>

            <!-- Head Base & Body -->
            <div class="layer layer-head">
                <div class="jacket">
                    <div class="jacket-collar left"></div>
                    <div class="jacket-collar right"></div>
                    <div class="jacket-detail-1"></div>
                    <div class="jacket-detail-2"></div>
                </div>
                <div class="neck">
                    <div class="cyber-wire"></div>
                </div>
                
                <!-- SCALP ELEMENT patches the parallax gap behind the face -->
                <div class="scalp"></div>

                <div class="ear left">
                    <div class="ear-detail"></div>
                    <div class="earring"></div>
                    <div class="earring e2"></div>
                </div>
                <div class="ear right">
                    <div class="ear-detail"></div>
                    <div class="earring"></div>
                </div>
                <div class="face-base">
                    <div class="contour left"></div>
                    <div class="contour right"></div>
                    <div class="chin-highlight"></div>
                    <div class="face-tattoo"></div>
                </div>
            </div>

            <!-- Features (Nose, Mouth) -->
            <div class="layer layer-features">
                <div class="nose">
                    <div class="nostril left"></div>
                    <div class="nostril right"></div>
                </div>
                <div class="lips">
                    <div class="lip-top-left"></div>
                    <div class="lip-top-right"></div>
                    <div class="lip-bottom"></div>
                    <div class="mouth-line"></div>
                </div>
            </div>

            <!-- Dynamic Eyes Layer -->
            <div class="layer layer-eyes">
                <div class="eye-container" data-style="1">
                    <div class="eye left">
                        <div class="eyelid"></div>
                        <div class="iris">
                            <div class="pupil"></div>
                            <div class="eye-reflection"></div>
                        </div>
                    </div>
                    <div class="eye right">
                        <div class="eyelid"></div>
                        <div class="iris">
                            <div class="pupil"></div>
                            <div class="eye-reflection"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Glasses (NEW 20 Styles Config) -->
            <div class="layer layer-glasses">
                <div class="glasses-container" data-glasses="1">
                    <div class="lens left"></div>
                    <div class="glasses-bridge"></div>
                    <div class="lens right"></div>
                </div>
            </div>

            <!-- Hair Mid Layer -->
            <div class="layer layer-hair-mid">
                <div class="spike s7"></div>
                <div class="spike s13"></div>
                <div class="spike s8"></div>
            </div>

            <!-- Front Hair Bangs -->
            <div class="layer layer-hair-front">
                <div class="spike s4"></div>
                <div class="spike s1"></div>
                <div class="spike s2"></div>
                <div class="spike s3"></div>
                <div class="spike s6"></div>
                <div class="spike s5"></div>
            </div>

            <!-- Forefront Stray Hairs -->
            <div class="layer layer-hair-forefront">
                <div class="spike thin s11"></div>
                <div class="spike thin s9"></div>
                <div class="spike thin s10"></div>
                <div class="spike thin s12"></div>
            </div>

        </div>
    </div>

    <!-- Mobile UI Controls -->
    <div class="controls-panel">
        <div class="control-group">
            <button id="btn-eye-prev">&lt;</button>
            <span>EYE</span>
            <button id="btn-eye-next">&gt;</button>
        </div>
        <div class="control-group">
            <button id="btn-glasses-prev">&lt;</button>
            <span>GLS</span>
            <button id="btn-glasses-next">&gt;</button>
        </div>
        <div class="control-group">
            <button id="btn-hair-prev">&lt;</button>
            <span>HAR</span>
            <button id="btn-hair-next">&gt;</button>
        </div>
        <div class="control-group">
            <button id="btn-out-prev">&lt;</button>
            <span>OUT</span>
            <button id="btn-out-next">&gt;</button>
        </div>
        <button id="btn-spin" class="spin-toggle">🎲 RANDOM SPIN</button>
    </div>

    <script>
        const root = document.documentElement;
        
        let targetX = 0;
        let targetY = 0;
        let currentX = 0;
        let currentY = 0;
        
        // Trackers for 20 styles each
        const totalHairStyles = 20;
        let currentHairStyle = 1;

        let currentEyeIdx = 0; 
        const eyeStylesMap = Array.from({length: 20}, (_, i) => (i + 1).toString());

        let currentGlassesIdx = 0;
        const glassesStylesMap = Array.from({length: 20}, (_, i) => (i + 1).toString());

        let currentOutfit = 1;
        const totalOutfits = 20;

        // --- UI Button Interactions ---
        function updateEyeStyle(direction) {
            currentEyeIdx = (currentEyeIdx + direction + 20) % 20;
            document.querySelector('.eye-container').setAttribute('data-style', eyeStylesMap[currentEyeIdx]);
        }

        function updateGlassesStyle(direction) {
            currentGlassesIdx = (currentGlassesIdx + direction + 20) % 20;
            document.querySelector('.glasses-container').setAttribute('data-glasses', glassesStylesMap[currentGlassesIdx]);
        }

        function updateHairStyle(direction) {
            currentHairStyle += direction;
            if (currentHairStyle > totalHairStyles) currentHairStyle = 1;
            if (currentHairStyle < 1) currentHairStyle = totalHairStyles;
            document.getElementById('character-scene').setAttribute('data-hairstyle', currentHairStyle);
        }

        function updateOutfitStyle(direction) {
            currentOutfit += direction;
            if (currentOutfit > totalOutfits) currentOutfit = 1;
            if (currentOutfit < 1) currentOutfit = totalOutfits;
            document.getElementById('character-scene').setAttribute('data-outfit', currentOutfit);
        }

        // Attach listeners and prevent touch from passing through to swipe
        const setupButton = (id, action, dir) => {
            const btn = document.getElementById(id);
            const handler = (e) => { e.preventDefault(); e.stopPropagation(); action(dir); };
            btn.addEventListener('mousedown', handler);
            btn.addEventListener('touchstart', handler, {passive: false});
        };

        setupButton('btn-eye-prev', updateEyeStyle, -1);
        setupButton('btn-eye-next', updateEyeStyle, 1);
        
        setupButton('btn-glasses-prev', updateGlassesStyle, -1);
        setupButton('btn-glasses-next', updateGlassesStyle, 1);

        setupButton('btn-hair-prev', updateHairStyle, -1);
        setupButton('btn-hair-next', updateHairStyle, 1);

        setupButton('btn-out-prev', updateOutfitStyle, -1);
        setupButton('btn-out-next', updateOutfitStyle, 1);

        // --- Wheel of Fortune Spin Logic ---
        function spinWheel() {
            const btn = document.getElementById('btn-spin');
            if (btn.disabled) return;
            btn.disabled = true;

            const duration = 3000;
            const start = performance.now();
            let lastTick = 0;

            function step(timestamp) {
                const elapsed = timestamp - start;
                const progress = elapsed / duration;

                // Easing logic: ticks start fast (40ms) and slow down massively at the end (up to 400ms)
                const currentTickThreshold = 40 + (360 * Math.pow(progress, 3));

                if (timestamp - lastTick > currentTickThreshold) {
                    // Randomize indices
                    currentEyeIdx = Math.floor(Math.random() * 20);
                    currentGlassesIdx = Math.floor(Math.random() * 20);
                    currentHairStyle = Math.floor(Math.random() * 20) + 1;
                    currentOutfit = Math.floor(Math.random() * 20) + 1;

                    // Apply styles
                    document.querySelector('.eye-container').setAttribute('data-style', eyeStylesMap[currentEyeIdx]);
                    document.querySelector('.glasses-container').setAttribute('data-glasses', glassesStylesMap[currentGlassesIdx]);
                    document.getElementById('character-scene').setAttribute('data-hairstyle', currentHairStyle);
                    document.getElementById('character-scene').setAttribute('data-outfit', currentOutfit);

                    lastTick = timestamp;
                }

                if (elapsed < duration) {
                    requestAnimationFrame(step);
                } else {
                    btn.disabled = false;
                }
            }
            requestAnimationFrame(step);
        }

        setupButton('btn-spin', spinWheel, null);

        // Prevent swiping from triggering on the control panel background
        const controlsPanel = document.querySelector('.controls-panel');
        controlsPanel.addEventListener('touchstart', e => e.stopPropagation(), {passive: false});
        controlsPanel.addEventListener('touchmove', e => e.stopPropagation(), {passive: false});

        // --- Relative Swipe / Drag Controls ---
        let isDragging = false;
        let lastPointerX = 0;
        let lastPointerY = 0;

        function handlePointerDown(e) {
            if (e.target.closest('.controls-panel')) return;
            isDragging = true;
            const pointer = e.touches ? e.touches[0] : e;
            lastPointerX = pointer.clientX;
            lastPointerY = pointer.clientY;
        }

        function handlePointerMove(e) {
            if (!isDragging) return;
            e.preventDefault(); 
            
            const pointer = e.touches ? e.touches[0] : e;
            const deltaX = pointer.clientX - lastPointerX;
            const deltaY = pointer.clientY - lastPointerY;
            
            targetX += (deltaX / window.innerWidth) * 2.5;
            targetY += (deltaY / window.innerHeight) * 2.5;

            targetX = Math.max(-1.5, Math.min(1.5, targetX));
            targetY = Math.max(-1, Math.min(1, targetY));

            lastPointerX = pointer.clientX;
            lastPointerY = pointer.clientY;
        }

        function handlePointerUp() {
            isDragging = false;
            targetX = 0;
            targetY = 0;
        }

        window.addEventListener('mousedown', handlePointerDown);
        window.addEventListener('mousemove', handlePointerMove);
        window.addEventListener('mouseup', handlePointerUp);
        window.addEventListener('mouseleave', handlePointerUp);
        window.addEventListener('touchstart', handlePointerDown, {passive: false});
        window.addEventListener('touchmove', handlePointerMove, {passive: false});
        window.addEventListener('touchend', handlePointerUp);

        // --- Keyboard Controls ---
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') targetX = -1;
            if (e.key === 'ArrowRight') targetX = 1;
            if (e.key === 'ArrowUp') targetY = -1;
            if (e.key === 'ArrowDown') targetY = 1;
            
            if (['1', '2', '3', '4', '5', '6', '7', '8', '9', '0'].includes(e.key)) {
                let indexMap = e.key === '0' ? 9 : parseInt(e.key) - 1;
                currentEyeIdx = indexMap;
                document.querySelector('.eye-container').setAttribute('data-style', eyeStylesMap[currentEyeIdx]);
            }
            
            const key = e.key.toLowerCase();
            if (key === 'z') updateHairStyle(-1);
            if (key === 'x') updateHairStyle(1);
            if (key === 'c') updateGlassesStyle(-1);
            if (key === 'v') updateGlassesStyle(1);
            if (key === 'b') updateOutfitStyle(-1);
            if (key === 'n') updateOutfitStyle(1);
        });

        window.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft' && targetX === -1) targetX = 0;
            if (e.key === 'ArrowRight' && targetX === 1) targetX = 0;
            if (e.key === 'ArrowUp' && targetY === -1) targetY = 0;
            if (e.key === 'ArrowDown' && targetY === 1) targetY = 0;
        });

        // --- Animation Loop ---
        function animate() {
            currentX += (targetX - currentX) * 0.08;
            currentY += (targetY - currentY) * 0.08;

            root.style.setProperty('--lookX', currentX.toFixed(4));
            root.style.setProperty('--lookY', currentY.toFixed(4));

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
