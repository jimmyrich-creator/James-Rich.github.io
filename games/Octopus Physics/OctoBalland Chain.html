<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matter.js Octopus Chains</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <script>
        // Matter.js Module Aliases
        const { Engine, Render, Runner, Composites, Common, MouseConstraint, Mouse, Composite, Bodies, Constraint, Body } = Matter;

        // 1. ASSET PRE-LOADING
        const assets = {
            link: new Image(),
            ball: new Image()
        };

        // Fallback SVGs in case local files fail to load in the preview environment
        const octoFallbackSvg = `data:image/svg+xml;base64,${btoa(`
            <svg xmlns="http://www.w3.org/2000/svg" width="100" height="100">
                <defs>
                    <radialGradient id="octoGrad" cx="50%" cy="40%" r="60%" fx="30%" fy="30%">
                        <stop offset="0%" style="stop-color:#ff7e5f;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#d44124;stop-opacity:1" />
                    </radialGradient>
                </defs>
                <circle cx="50" cy="45" r="45" fill="url(#octoGrad)" />
                <ellipse cx="32" cy="82" rx="6" ry="4" fill="white" stroke="#331100" stroke-width="1"/>
                <circle cx="32" cy="82" r="2" fill="black" />
                <ellipse cx="68" cy="82" rx="6" ry="4" fill="white" stroke="#331100" stroke-width="1"/>
                <circle cx="68" cy="82" r="2" fill="black" />
            </svg>
        `.trim())}`;

        const linkFallbackSvg = `data:image/svg+xml;base64,${btoa('<svg xmlns="http://www.w3.org/2000/svg" width="40" height="20"><rect x="2" y="2" width="36" height="16" rx="8" fill="#d44124" stroke="white" stroke-width="2"/></svg>')}`;

        let loadedCount = 0;
        const totalAssets = 2;

        const startSimulation = () => {
            loadedCount++;
            if (loadedCount >= totalAssets) {
                init();
            }
        };

        // Load Tentacle Link
        assets.link.onload = startSimulation;
        assets.link.onerror = () => {
            console.warn("Tentacle.png not found. Using fallback.");
            assets.link.src = linkFallbackSvg;
        };
        assets.link.src = 'Tentacle.png';

        // Load Octopus Head
        assets.ball.onload = startSimulation;
        assets.ball.onerror = () => {
            console.warn("Octohead.png not found. Using fallback.");
            assets.ball.src = octoFallbackSvg;
        };
        assets.ball.src = 'Octohead.png';

        function init() {
            const config = {
                wireframes: false,
                linkWidth: 50,  // Slightly wider for the tentacle texture
                linkHeight: 25,
                ballRadius: 55 
            };

            const engine = Engine.create();
            const world = engine.world;

            const render = Render.create({
                element: document.getElementById('canvas-container'),
                engine: engine,
                options: {
                    width: window.innerWidth,
                    height: window.innerHeight,
                    wireframes: config.wireframes,
                    background: '#0d1117', // Darker oceanic background
                    pixelRatio: window.devicePixelRatio
                }
            });

            Render.run(render);
            const runner = Runner.create();
            Runner.run(runner, engine);

            const group = Body.nextGroup(true);

            const createChain = (x, y, length, ball = false) => {
                const chain = Composites.stack(x, y, length, 1, 10, 10, (x, y) => {
                    return Bodies.rectangle(x, y, config.linkWidth, config.linkHeight, { 
                        collisionFilter: { group: group },
                        chamfer: 5,
                        render: {
                            sprite: {
                                texture: assets.link.src,
                                // Fit the tentacle image to the physics body
                                xScale: config.linkWidth / (assets.link.width || 50),
                                yScale: config.linkHeight / (assets.link.height || 25)
                            }
                        }
                    });
                });

                Composites.chain(chain, 0.5, 0, -0.5, 0, { 
                    stiffness: 0.8, 
                    length: 2, 
                    render: { 
                        visible: true,
                        lineWidth: 2,
                        strokeStyle: '#3a2118' // Darker organic-looking joints
                    } 
                });

                // Anchor to world
                Composite.add(chain, Constraint.create({ 
                    bodyB: chain.bodies[0],
                    pointB: { x: -config.linkWidth/2, y: 0 },
                    pointA: { x: chain.bodies[0].position.x - config.linkWidth/2, y: chain.bodies[0].position.y },
                    stiffness: 0.5,
                    render: { strokeStyle: '#3a2118' }
                }));

                if (ball) {
                    const lastBody = chain.bodies[chain.bodies.length - 1];
                    const heavyBall = Bodies.circle(lastBody.position.x + config.linkWidth, lastBody.position.y, config.ballRadius, {
                        density: 0.05,
                        frictionAir: 0.005,
                        render: {
                            sprite: {
                                texture: assets.ball.src,
                                xScale: (config.ballRadius * 2.2) / (assets.ball.width || 100),
                                yScale: (config.ballRadius * 2.2) / (assets.ball.height || 100)
                            }
                        }
                    });
                    
                    Composite.add(world, heavyBall);
                    Composite.add(world, Constraint.create({
                        bodyA: lastBody,
                        bodyB: heavyBall,
                        pointA: { x: config.linkWidth/2, y: 0 },
                        pointB: { x: 0, y: -config.ballRadius + 10 },
                        stiffness: 0.8,
                        length: 5,
                        render: { strokeStyle: '#3a2118' }
                    }));
                }

                return chain;
            };

            const centerX = window.innerWidth / 2;

            Composite.add(world, [
                createChain(centerX - 250, 100, 8, true),
                createChain(centerX + 250, 100, 8, true),
                createChain(centerX, 80, 5, false)
            ]);

            const ground = Bodies.rectangle(window.innerWidth/2, window.innerHeight + 25, window.innerWidth, 50, { 
                isStatic: true,
                render: { fillStyle: '#05070a' }
            });
            Composite.add(world, ground);

            const mouse = Mouse.create(render.canvas);
            const mouseConstraint = MouseConstraint.create(engine, {
                mouse: mouse,
                constraint: {
                    stiffness: 0.2,
                    render: { visible: false }
                }
            });

            Composite.add(world, mouseConstraint);
            render.mouse = mouse;

            window.addEventListener('resize', () => {
                render.canvas.width = window.innerWidth;
                render.canvas.height = window.innerHeight;
                render.options.width = window.innerWidth;
                render.options.height = window.innerHeight;
                Matter.Body.setPosition(ground, { x: window.innerWidth/2, y: window.innerHeight + 25 });
            });
        }
    </script>
</body>
</html>
