<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Grab a Crab – Octopus Physics</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            position: relative;
            width: 100vw;
            height: 100vh;
            /* Prevent pull-to-refresh / overscroll on mobile */
            overscroll-behavior: none;
            touch-action: none;
            background-color: #0d1117;
            background-image: url('background.png');
            background-size: cover;
            background-position: center;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        #octopus-head-container {
            position: absolute;
            bottom: -80px;
            left: 50%;
            transform: translateX(-50%);
            width: 375px;
            height: 375px;
            pointer-events: none;
            z-index: 100;
            display: none;
            will-change: transform;
            /* GPU-composited layer for wobble */
        }

        /* Scale head down on mobile */
        body.is-mobile #octopus-head-container {
            width: 180px;
            height: 180px;
            bottom: -40px;
        }

        body.is-mobile .eye {
            width: 22px;
            height: 22px;
            top: 58px;
            border-width: 2px;
        }

        body.is-mobile .eye-left {
            left: 63px;
        }

        body.is-mobile .eye-right {
            left: 96px;
        }

        body.is-mobile .pupil {
            width: 10px;
            height: 10px;
        }

        body.is-mobile #scoreboard {
            font-size: 1rem;
            top: 8px;
            left: 8px;
        }

        body.is-mobile #combo-display {
            font-size: 0.85rem;
        }

        #octopus-head-img {
            width: 100%;
            height: 100%;
            display: block;
        }

        .eye {
            position: absolute;
            width: 45px;
            height: 45px;
            background: white;
            border-radius: 50%;
            border: 4px solid #333;
            top: 120px;
            overflow: hidden;
        }

        .eye-left {
            left: 130px;
        }

        .eye-right {
            left: 200px;
        }

        .pupil {
            position: absolute;
            width: 22px;
            height: 22px;
            background: black;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .pupil::after {
            content: '';
            position: absolute;
            width: 7px;
            height: 7px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            top: 3px;
            left: 3px;
        }

        #scoreboard {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: clamp(1.2rem, 4vw, 2.5rem);
            font-weight: bold;
            text-shadow: 2px 2px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 0 0 #000, 0 2px 0 #000;
            z-index: 200;
            pointer-events: none;
            line-height: 1.2;
        }

        #combo-display {
            font-size: clamp(0.9rem, 3vw, 1.8rem);
            color: #ffcc00;
            transition: transform 0.2s;
        }

        .end-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.8);
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 300;
            display: none;
            /* toggled to flex on win/loss/start */
        }

        #start-screen {
            display: flex;
            background: linear-gradient(rgba(0, 100, 200, 0.4), rgba(0, 0, 0, 0.8)), url('background.png');
            background-size: cover;
            background-position: center;
        }

        #start-screen h1 {
            font-size: 8rem;
            margin-bottom: 20px;
            color: #ffcc00;
        }

        .start-btn {
            padding: 22px 70px;
            font-size: 2.5rem;
            background: linear-gradient(135deg, #00ff88, #00bbff);
            color: #000;
            box-shadow: 0 10px 30px rgba(0, 255, 136, 0.4);
        }

        .start-btn:hover {
            box-shadow: 0 15px 40px rgba(0, 255, 136, 0.6);
        }

        .end-screen h1 {
            font-size: clamp(3rem, 15vw, 8rem);
            margin: 0;
            text-shadow: 4px 4px 0 #000;
            text-align: center;
        }

        .end-screen p {
            font-size: clamp(1.2rem, 5vw, 2.5rem);
            text-shadow: 2px 2px 0 #000;
            margin: 10px 0 30px;
            text-align: center;
        }

        #win-screen h1 {
            color: #ffcc00;
        }

        #gameover-screen h1 {
            color: #ff4444;
        }

        .retry-btn {
            padding: 18px 50px;
            font-size: 2rem;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            background: linear-gradient(135deg, #ffcc00, #ff8800);
            color: #000;
            text-shadow: none;
            box-shadow: 0 6px 20px rgba(255, 136, 0, 0.4);
            transition: transform 0.15s, box-shadow 0.15s;
            pointer-events: auto;
        }

        .retry-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 8px 30px rgba(255, 136, 0, 0.6);
        }

        .retry-btn:active {
            transform: scale(0.96);
        }

        canvas {
            display: block;
            touch-action: none;
            /* prevent browser gestures on the game canvas */
        }

        }

        #rotate-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #0d1117;
            color: white;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            text-align: center;
            padding: 20px;
        }

        #rotate-overlay h2 {
            font-size: 2.5rem;
            color: #ffcc00;
            margin-bottom: 20px;
        }

        #rotate-overlay .icon {
            width: 100px;
            height: 100px;
            border: 4px solid white;
            border-radius: 10px;
            margin-bottom: 20px;
            animation: rotate-phone 2s infinite ease-in-out;
        }

        @keyframes rotate-phone {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(90deg); }
            100% { transform: rotate(90deg); }
        }

        }
    </style>
</head>

<body>

    <div id="rotate-overlay">
        <div class="icon"></div>
        <h2>Please Rotate Your Device</h2>
        <p>This game is best played in Landscape mode.</p>
    </div>
    <div id="canvas-container"></div>
    <div id="octopus-head-container">
        <img id="octopus-head-img" src="octopus_head.png" alt="Octopus Boss">
        <div class="eye eye-left">
            <div class="pupil"></div>
        </div>
        <div class="eye eye-right">
            <div class="pupil"></div>
        </div>
    </div>

    <div id="scoreboard">
        Score: <span id="score-val">0</span> / 1000<br>
        <div id="combo-display">Combo: x<span id="combo-val">1</span></div>
    </div>
    <div id="win-screen" class="end-screen">
        <h1>YOU WIN!</h1>
        <p>The Octopus is full!</p>
        <button class="retry-btn" onclick="resetGame()">Play Again</button>
    </div>
    <div id="gameover-screen" class="end-screen">
        <h1>GAME OVER</h1>
        <p>A shark chomped your tentacle!</p>
        <button class="retry-btn" onclick="resetGame()">Retry</button>
    </div>

    <div id="start-screen" class="end-screen">
        <h1>OCTOPUS FEAST</h1>
        <p>Catch shellfish, avoid sharks!</p>
        <button id="play-btn" class="retry-btn start-btn">PLAY</button>
    </div>

    <script>
        // Matter.js Module Aliases
        const { Engine, Render, Runner, Composites, Common, MouseConstraint, Mouse, Composite, Bodies, Constraint, Body } = Matter;

        // ──────────────────────────────────
        // 0. SOUND EFFECTS (Web Audio API)
        // ──────────────────────────────────
        const SFX = (() => {
            let audioCtx = null;

            const init = () => {
                if (audioCtx) return;
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            };

            const playSquelch = () => {
                if (!audioCtx) return;
                if (audioCtx.state === 'suspended') audioCtx.resume();

                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();

                osc.type = 'sine';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.1);

                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);

                osc.connect(gain);
                gain.connect(audioCtx.destination);

                osc.start();
                osc.stop(audioCtx.currentTime + 0.15);

                // Add a little noise for the "squelch"
                const bufferSize = audioCtx.sampleRate * 0.1;
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;

                const noise = audioCtx.createBufferSource();
                noise.buffer = buffer;
                const noiseGain = audioCtx.createGain();
                const filter = audioCtx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 1000;

                noiseGain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                noiseGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);

                noise.connect(filter);
                filter.connect(noiseGain);
                noiseGain.connect(audioCtx.destination);
                noise.start();
            };

            const playChompSnap = () => {
                if (!audioCtx) return;
                if (audioCtx.state === 'suspended') audioCtx.resume();

                // --- CHOMP ---
                const osc1 = audioCtx.createOscillator();
                const gain1 = audioCtx.createGain();
                osc1.type = 'sine';
                osc1.frequency.setValueAtTime(300, audioCtx.currentTime);
                osc1.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.08);
                gain1.gain.setValueAtTime(0.5, audioCtx.currentTime);
                gain1.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc1.connect(gain1);
                gain1.connect(audioCtx.destination);
                osc1.start();
                osc1.stop(audioCtx.currentTime + 0.1);

                // --- SNAP / PING ---
                setTimeout(() => {
                    const osc2 = audioCtx.createOscillator();
                    const gain2 = audioCtx.createGain();
                    osc2.type = 'triangle';
                    osc2.frequency.setValueAtTime(1200, audioCtx.currentTime);
                    osc2.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.2);
                    gain2.gain.setValueAtTime(0.4, audioCtx.currentTime);
                    gain2.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                    osc2.connect(gain2);
                    gain2.connect(audioCtx.destination);
                    osc2.start();
                    osc2.stop(audioCtx.currentTime + 0.3);
                }, 80);
            };

            const playMusic = () => {
                if (!audioCtx) return;
                const bpm = 110;
                const stepTime = 60 / bpm / 2; // 1/8th note

                let step = 0;
                const bassNotes = [130.81, 164.81, 146.83, 174.61]; // C3, E3, D3, F3 approx
                const melodyNotes = [261.63, 293.66, 329.63, 392.00, 440.00]; // C4 Pentatonic

                setInterval(() => {
                    if (audioCtx.state === 'suspended') return;

                    const now = audioCtx.currentTime;

                    // --- BASS (every 2 steps) ---
                    if (step % 2 === 0) {
                        const osc = audioCtx.createOscillator();
                        const g = audioCtx.createGain();
                        osc.frequency.value = bassNotes[Math.floor(step / 4) % bassNotes.length];
                        g.gain.setValueAtTime(0.1, now);
                        g.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
                        osc.connect(g).connect(audioCtx.destination);
                        osc.start();
                        osc.stop(now + 0.3);
                    }

                    // --- MELODY (random syncopation) ---
                    if (Math.random() > 0.6) {
                        const osc = audioCtx.createOscillator();
                        const g = audioCtx.createGain();
                        osc.type = 'triangle';
                        osc.frequency.value = melodyNotes[Math.floor(Math.random() * melodyNotes.length)];
                        g.gain.setValueAtTime(0.08, now);
                        g.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
                        osc.connect(g).connect(audioCtx.destination);
                        osc.start();
                        osc.stop(now + 0.2);
                    }

                    // --- PERCUSSION (every step) ---
                    const pOsc = audioCtx.createOscillator();
                    const pG = audioCtx.createGain();
                    pOsc.frequency.setValueAtTime(10, now); // low thud
                    pG.gain.setValueAtTime(0.05, now);
                    pG.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
                    pOsc.connect(pG).connect(audioCtx.destination);
                    pOsc.start();
                    pOsc.stop(now + 0.05);

                    step++;
                }, stepTime * 1000);
            };

            return { init, playSquelch, playChompSnap, playMusic };
        })();

        // ──────────────────────────────────
        // 1. ASSET PRE-LOADING
        // ──────────────────────────────────
        const assets = {
            link: new Image(),
            lobster: new Image(),
            clam: new Image(),
            head: new Image(),
            sharkOpen: new Image(),
            sharkClosed: new Image(),
            tip: new Image()
        };

        const fallbackSvg = `data:image/svg+xml;base64,${btoa('<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40"><circle cx="20" cy="20" r="20" fill="gray"/></svg>')}`;

        let loadedCount = 0;
        const totalAssets = 7;

        const startSimulation = () => {
            loadedCount++;
            if (loadedCount >= totalAssets) {
                initGame();
            }
        };

        assets.link.onload = startSimulation;
        assets.link.onerror = () => { assets.link.src = fallbackSvg; };
        assets.link.src = 'tentacle_section.png';

        assets.lobster.onload = startSimulation;
        assets.lobster.onerror = () => { assets.lobster.src = fallbackSvg; };
        assets.lobster.src = 'lobster.png';

        assets.clam.onload = startSimulation;
        assets.clam.onerror = () => { assets.clam.src = fallbackSvg; };
        assets.clam.src = 'clam.png';

        assets.head.onload = startSimulation;
        assets.head.onerror = () => { assets.head.src = fallbackSvg; };
        assets.head.src = 'octopus_head.png';

        assets.sharkOpen.onload = startSimulation;
        assets.sharkOpen.onerror = () => { assets.sharkOpen.src = fallbackSvg; };
        assets.sharkOpen.src = 'shark_open.png';

        assets.sharkClosed.onload = startSimulation;
        assets.sharkClosed.onerror = () => { assets.sharkClosed.src = fallbackSvg; };
        assets.sharkClosed.src = 'shark_closed.png';

        assets.tip.onload = startSimulation;
        assets.tip.onerror = () => { assets.tip.src = fallbackSvg; };
        assets.tip.src = 'tentacle_tip.png';

        // ──────────────────────────────────
        // 2. GLOBAL GAME STATE
        // ──────────────────────────────────
        let engine, render, runner, world;
        let tentacle, tentacleBodySet, tentacleBodyIndexMap;
        let preyArray = [], stuckPrey = [], sharkArray = [], sharkBodySet = new Set();
        let score = 0, comboMultiplier = 1, lastEatenTime = 0, gameOver = false;
        let W, H, config;

        const scoreEl = document.getElementById('score-val');
        const comboEl = document.getElementById('combo-val');
        const comboContainer = document.getElementById('combo-display');
        const winScreen = document.getElementById('win-screen');
        const gameoverScreen = document.getElementById('gameover-screen');
        const startScreen = document.getElementById('start-screen');
        const headContainer = document.getElementById('octopus-head-container');
        const pupils = document.querySelectorAll('.pupil');
        const eyeStates = [{ x: 0, y: 0, vx: 0, vy: 0 }, { x: 0, y: 0, vx: 0, vy: 0 }];
        let mouse, mouseConstraint;

        let sharkFramesRight = [], sharkFramesLeft = [];

        // ──────────────────────────────────
        // 3. MAIN INIT
        // ──────────────────────────────────
        function initGame() {
            W = window.innerWidth;
            H = window.innerHeight;

            engine = Engine.create();
            world = engine.world;
            engine.world.gravity.y = -0.4;

            const cappedPixelRatio = Math.min(window.devicePixelRatio || 1, 2);

            render = Render.create({
                element: document.getElementById('canvas-container'),
                engine: engine,
                options: {
                    width: W,
                    height: H,
                    wireframes: false,
                    background: 'transparent',
                    pixelRatio: cappedPixelRatio
                }
            });

            Render.run(render);
            runner = Runner.create();

            // Prepare shark frames once
            function flipImageToDataURL(img) {
                const c = document.createElement('canvas');
                c.width = img.width;
                c.height = img.height;
                const ctx = c.getContext('2d');
                ctx.translate(c.width, 0);
                ctx.scale(-1, 1);
                ctx.drawImage(img, 0, 0);
                return c.toDataURL('image/png');
            }
            sharkFramesRight = [assets.sharkOpen.src, flipImageToDataURL(assets.sharkClosed)];
            sharkFramesLeft = [flipImageToDataURL(assets.sharkOpen), assets.sharkClosed.src];

            // Setup mouse/touch once
            mouse = Mouse.create(render.canvas);
            mouseConstraint = MouseConstraint.create(engine, {
                mouse: mouse,
                constraint: { stiffness: 0.1, render: { visible: false } }
            });
            // We'll add mouseConstraint in resetGame where it clears the world
            render.mouse = mouse;

            render.canvas.addEventListener('touchstart', (e) => { e.preventDefault(); }, { passive: false });
            render.canvas.addEventListener('touchmove', (e) => { e.preventDefault(); }, { passive: false });
            render.canvas.addEventListener('touchend', (e) => { e.preventDefault(); }, { passive: false });

            // Event Listeners
            setupEventListeners();
            
            // First time setup
            resetGame(true);

            // Play button
            document.getElementById('play-btn').addEventListener('click', async () => {
                // Request fullscreen first (required by many mobile browsers before locking orientation)
                try {
                    const docEl = document.documentElement;
                    if (docEl.requestFullscreen) {
                        await docEl.requestFullscreen();
                    } else if (docEl.webkitRequestFullscreen) { /* Safari */
                        await docEl.webkitRequestFullscreen();
                    } else if (docEl.msRequestFullscreen) { /* IE11 */
                        await docEl.msRequestFullscreen();
                    }
                } catch (e) {
                    console.log("Fullscreen request failed:", e);
                }

                // Attempt to lock orientation
                if (screen.orientation && screen.orientation.lock) {
                    try {
                        await screen.orientation.lock('landscape');
                    } catch (e) {
                        console.log("Orientation lock failed:", e);
                    }
                }

                SFX.init();
                SFX.playMusic();
                startScreen.style.display = 'none';
                
                // Start the physics runner once
                Runner.run(runner, engine);
            });
        }

        function resetGame(isFirstLoad = false) {
            // Reset state
            gameOver = false;
            score = 0;
            comboMultiplier = 1;
            lastEatenTime = 0;
            preyArray = [];
            stuckPrey = [];
            sharkArray = [];
            sharkBodySet.clear();
            
            scoreEl.textContent = '0';
            comboEl.textContent = '1';
            comboContainer.style.transform = 'scale(1)';
            winScreen.style.display = 'none';
            gameoverScreen.style.display = 'none';
            headContainer.style.display = 'block';

            // Clear world
            try {
                Composite.clear(world, false);
            } catch (e) {
                console.error("Error clearing world:", e);
            }
            world.gravity.y = -0.4;

            // Re-calculate config based on current dimensions
            W = window.innerWidth;
            H = window.innerHeight;
            // Detect mobile via user-agent OR small screen
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)
                          || (navigator.maxTouchPoints > 1 && W < 1024);
            const isPortrait = H > W;

            // Mark body so CSS rules apply
            if (isMobile) {
                document.body.classList.add('is-mobile');
            } else {
                document.body.classList.remove('is-mobile');
            }

            // Scale everything smaller on mobile so nothing is zoomed/oversized
            const baseLinkHeight = isMobile ? 14 : 30;
            const baseLinkWidth  = isMobile ? 38 : 80;
            const avgLinkHeight  = baseLinkHeight * 2.0;
            const neededLinks    = Math.ceil(H / avgLinkHeight) + (isPortrait ? 4 : 2);

            config = {
                linkWidth:     baseLinkWidth,
                linkHeight:    baseLinkHeight,
                crabRadius:    isMobile ? 14 : 35,
                maxPrey:       isMobile ? 8  : 12,
                tentacleLinks: neededLinks,
                sharkRadius:   isMobile ? 28 : 55,
                maxSharks:     isMobile ? 2  : 3,
                // Safe Y zone for sharks: top 35% of screen (well above octopus head at bottom)
                sharkMaxY:     isMobile ? H * 0.35 : H * 0.5
            };

            // Re-add boundaries
            const wallThickness = 50;
            Composite.add(world, [
                Bodies.rectangle(W / 2, -wallThickness / 2, W * 2, wallThickness, { isStatic: true, render: { visible: false } }),
                Bodies.rectangle(-wallThickness / 2, H / 2, wallThickness, H * 2, { isStatic: true, render: { visible: false } }),
                Bodies.rectangle(W + wallThickness / 2, H / 2, wallThickness, H * 2, { isStatic: true, render: { visible: false } })
            ]);

            // Re-create tentacle
            const tentacleGroup = Body.nextGroup(true);
            const centerX = W / 2;
            const bottomY = H;
            
            const bodies = [];
            let currentY = bottomY;
            for (let i = 0; i < config.tentacleLinks; i++) {
                const scale = 1.0 + (i / (config.tentacleLinks - 1)) * 2.0;
                const w = config.linkWidth * scale;
                const h = config.linkHeight * scale;
                const body = Bodies.rectangle(centerX, currentY, w, h, {
                    collisionFilter: { group: tentacleGroup },
                    chamfer: 5,
                    density: 0.005,
                    frictionAir: 0.05,
                    render: {
                        zIndex: 10,
                        sprite: {
                            texture: (i === 0) ? assets.tip.src : assets.link.src,
                            xScale: w / ((i === 0 ? assets.tip.width : assets.link.width) || 40),
                            yScale: (h / ((i === 0 ? assets.tip.height : assets.link.height) || 60)) * 1.25
                        }
                    }
                });
                body.segmentHeight = h;
                bodies.push(body);
                currentY += h;
            }

            tentacle = Composite.create({ bodies: bodies });
            Composites.chain(tentacle, 0, 0.4, 0, -0.4, { stiffness: 0.9, length: 2, render: { visible: false } });

            const bottomBody = tentacle.bodies[config.tentacleLinks - 1];
            Composite.add(tentacle, Constraint.create({
                bodyB: bottomBody,
                pointB: { x: 0, y: bottomBody.segmentHeight / 2 },
                pointA: { x: centerX, y: bottomY },
                length: 0, stiffness: 1, render: { visible: false }
            }));

            Composite.add(world, tentacle);

            tentacleBodySet = new Set();
            tentacleBodyIndexMap = new Map();
            tentacle.bodies.forEach((b, idx) => {
                tentacleBodySet.add(b.id);
                tentacleBodyIndexMap.set(b.id, idx);
            });

            // Re-add mouse constraint
            if (mouseConstraint) {
                Composite.add(world, mouseConstraint);
            }

            // We do NOT stop or restart the runner here. The game loop continues to tick.
            // We just clear the world and recreate the bodies to perform the reset.
            console.log("Game reset complete. links:", neededLinks);
        }

        function checkOrientation() {
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || (navigator.maxTouchPoints > 0);
            const isPortrait = window.innerHeight > window.innerWidth;
            const rotateOverlay = document.getElementById('rotate-overlay');
            
            if (isMobile && isPortrait) {
                rotateOverlay.style.display = 'flex';
            } else {
                rotateOverlay.style.display = 'none';
            }
        }

        function setupEventListeners() {
            // Check orientation on load
            checkOrientation();

            let lastWobbleTime = 0;
            Matter.Events.on(engine, 'beforeUpdate', () => {
                const time = Common.now();
                const doWobble = (time - lastWobbleTime > 150);
                if (doWobble) lastWobbleTime = time;

                // Prey logic
                for (let i = 0; i < preyArray.length; i++) {
                    const prey = preyArray[i];
                    if (!prey.isStuck) {
                        if (prey.preyType === 'lobster') {
                            if (Math.random() < 0.05) {
                                Body.applyForce(prey, prey.position, { x: (Math.random() - 0.5) * 0.15, y: (Math.random() - 0.2) * 0.08 });
                            }
                            const vx = prey.velocity.x;
                            if (vx > 15 || vx < -15) Body.setVelocity(prey, { x: Math.max(-15, Math.min(15, vx)), y: prey.velocity.y });
                        } else {
                            Body.applyForce(prey, prey.position, { x: (Math.random() - 0.5) * 0.003, y: 0 });
                        }
                    }
                    if (doWobble && prey.render.sprite.texture) {
                        const ws = 1.0 + (Math.random() - 0.5) * 0.1;
                        prey.render.sprite.xScale = prey.baseScaleX * ws;
                        prey.render.sprite.yScale = prey.baseScaleY * ws;
                        Body.setAngle(prey, prey.angle + (Math.random() - 0.5) * 0.2);
                    }
                }

                // Shark logic
                for (let i = sharkArray.length - 1; i >= 0; i--) {
                    const shark = sharkArray[i];
                    Body.setVelocity(shark, { x: shark.sharkSpeed, y: 0 });
                    Body.setAngle(shark, 0);
                    if ((shark.sharkSpeed > 0 && shark.position.x > W + 200) || (shark.sharkSpeed < 0 && shark.position.x < -200)) {
                        Composite.remove(world, shark);
                        sharkBodySet.delete(shark.id);
                        sharkArray.splice(i, 1);
                    }
                    if (doWobble && shark.render.sprite.texture) {
                        shark.animFrame = (shark.animFrame + 1) % 2;
                        shark.render.sprite.texture = shark.sharkFrames[shark.animFrame];
                        const ws = 1.0 + (Math.random() - 0.5) * 0.06;
                        shark.render.sprite.xScale = shark.baseScaleX * ws;
                        shark.render.sprite.yScale = shark.baseScaleY * ws;
                    }
                }

                // Wobble head
                if (doWobble) {
                    const ws = 1.0 + (Math.random() - 0.5) * 0.03;
                    headContainer.style.transform = `translateX(-50%) scale(${ws})`;
                }

                // Eyes
                const tentacleVelocity = tentacle.bodies[0].velocity;
                eyeStates.forEach((state, i) => {
                    const targetX = tentacleVelocity.x * 2, targetY = tentacleVelocity.y * 2;
                    state.vx += (targetX - state.x) * 0.1;
                    state.vy += (targetY - state.y) * 0.1;
                    state.vx *= 0.85; state.vy *= 0.85;
                    state.x += state.vx; state.y += state.vy;
                    const limit = 12, dist = Math.sqrt(state.x * state.x + state.y * state.y);
                    if (dist > limit) { state.x = (state.x / dist) * limit; state.y = (state.y / dist) * limit; }
                    pupils[i].style.transform = `translate(calc(-50% + ${state.x}px), calc(-50% + ${state.y}px))`;
                });

                if (gameOver) return;

                // Combo timeout
                if (time - lastEatenTime > 2000 && comboMultiplier > 1) {
                    comboMultiplier = 1;
                    comboEl.textContent = '1';
                    comboContainer.style.transform = 'scale(1)';
                }

                // Slide & Eat
                for (let i = stuckPrey.length - 1; i >= 0; i--) {
                    const info = stuckPrey[i];
                    if (time - info.lastMoveTime <= 1200) continue;
                    info.lastMoveTime = time;
                    if (info.currentLink < tentacle.bodies.length - 1) {
                        info.currentLink++;
                        info.constraint.bodyB = tentacle.bodies[info.currentLink];
                    } else {
                        Composite.remove(world, info.constraint);
                        Composite.remove(world, info.prey);
                        const preyIdx = preyArray.indexOf(info.prey);
                        if (preyIdx !== -1) { preyArray[preyIdx] = preyArray[preyArray.length - 1]; preyArray.pop(); }
                        if (time - lastEatenTime <= 2000 && score > 0) {
                            comboMultiplier++;
                            comboContainer.style.transform = `scale(${1 + Math.min(comboMultiplier, 10) * 0.1})`;
                        } else {
                            comboMultiplier = 1;
                            comboContainer.style.transform = 'scale(1)';
                        }
                        lastEatenTime = time;
                        score += info.prey.baseValue * comboMultiplier;
                        scoreEl.textContent = score;
                        comboEl.textContent = comboMultiplier;
                        if (score >= 1000) { gameOver = true; winScreen.style.display = 'flex'; }
                        stuckPrey.splice(i, 1);
                    }
                }
            });

            Matter.Events.on(engine, 'collisionStart', (event) => {
                const pairs = event.pairs;
                for (let i = 0; i < pairs.length; i++) {
                    const { bodyA, bodyB } = pairs[i];
                    const aIsTent = tentacleBodySet.has(bodyA.id), bIsTent = tentacleBodySet.has(bodyB.id);
                    const aIsShark = sharkBodySet.has(bodyA.id), bIsShark = sharkBodySet.has(bodyB.id);

                    if ((aIsTent && bIsShark) || (bIsTent && aIsShark)) {
                        const tentacleBody = aIsTent ? bodyA : bodyB;
                        const chopIdx = tentacleBodyIndexMap.get(tentacleBody.id);
                        if (chopIdx !== undefined) triggerGameOver(chopIdx);
                        continue;
                    }

                    const aIsPrey = bodyA.isPrey, bIsPrey = bodyB.isPrey;
                    if ((aIsTent && bIsPrey) || (bIsTent && aIsPrey)) {
                        const preyBody = aIsPrey ? bodyA : bodyB, tentacleBody = aIsTent ? bodyA : bodyB;
                        if (!preyBody.isStuck) {
                            preyBody.isStuck = true;
                            preyBody.isSensor = true;
                            SFX.playSquelch();
                            const linkIndex = tentacleBodyIndexMap.get(tentacleBody.id);
                            const stickConstraint = Constraint.create({ bodyA: preyBody, bodyB: tentacleBody, stiffness: 1.0, render: { visible: false } });
                            Composite.add(world, stickConstraint);
                            stuckPrey.push({ prey: preyBody, constraint: stickConstraint, currentLink: linkIndex, lastMoveTime: Common.now() });
                        }
                    }
                }
            });

            // Spawning timers
            setInterval(() => {
                if (gameOver || preyArray.length > config.maxPrey) return;
                const xPos = Math.random() * (W - 100) + 50;
                const isLobster = Math.random() > 0.5, asset = isLobster ? assets.lobster : assets.clam;
                const preyBody = Bodies.circle(xPos, 100, config.crabRadius, {
                    frictionAir: isLobster ? 0.02 : 0.08, density: 0.002, restitution: 0.8,
                    render: { zIndex: 5, sprite: { texture: asset.src, xScale: (config.crabRadius * 2.2) / (asset.width || 60), yScale: (config.crabRadius * 2.2) / (asset.height || 60) } }
                });
                preyBody.isPrey = true; preyBody.preyType = isLobster ? 'lobster' : 'clam'; preyBody.baseValue = isLobster ? 50 : 10;
                preyBody.baseScaleX = (config.crabRadius * 2.2) / (asset.width || 60); preyBody.baseScaleY = (config.crabRadius * 2.2) / (asset.height || 60);
                preyArray.push(preyBody); Composite.add(world, preyBody);
            }, 2500);

            setInterval(() => {
                if (gameOver || sharkArray.length >= config.maxSharks) return;
                const isMob = document.body.classList.contains('is-mobile');
                const sharkVisualW = isMob ? 120 : 240;
                const sharkVisualH = isMob ? 80  : 160;
                const fromLeft = Math.random() > 0.5;
                const startX = fromLeft ? -sharkVisualW : W + sharkVisualW;
                // Clamp spawn Y so sharks always stay in the safe upper zone, never near the octopus head
                const startY = Math.random() * (config.sharkMaxY - sharkVisualH) + sharkVisualH;
                const speed = (Math.random() * 2 + 2) * (fromLeft ? 1 : -1);
                const frames = fromLeft ? sharkFramesRight : sharkFramesLeft;
                const sharkBody = Bodies.rectangle(startX, startY, sharkVisualW * 0.65, sharkVisualH * 0.5, {
                    isSensor: true, frictionAir: 0,
                    render: { sprite: { texture: frames[0],
                        xScale: sharkVisualW / (assets.sharkOpen.width || 120),
                        yScale: sharkVisualH / (assets.sharkOpen.height || 80)
                    }}
                });
                sharkBody.isShark = true; sharkBody.sharkSpeed = speed;
                sharkBody.baseScaleX = sharkVisualW / (assets.sharkOpen.width || 120);
                sharkBody.baseScaleY = sharkVisualH / (assets.sharkOpen.height || 80);
                sharkBody.animFrame = 0; sharkBody.sharkFrames = frames;
                Body.setInertia(sharkBody, Infinity);
                sharkArray.push(sharkBody); sharkBodySet.add(sharkBody.id); Composite.add(world, sharkBody);
            }, 4000);

            // Resize handler
            let resizeTimer;
            window.addEventListener('resize', () => {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(() => {
                    const newW = window.innerWidth, newH = window.innerHeight;
                    if (Math.abs(newW - W) < 50 && Math.abs(newH - H) < 50) return; // Ignore small mobile browser bar jumps
                    
                    render.canvas.width = newW; render.canvas.height = newH;
                    render.options.width = newW; render.options.height = newH;
                    
                    // Full reset on major resize/orientation change to recalculate tentacle links
                    checkOrientation();
                    resetGame();
                }, 200);
            });
        }

        const triggerGameOver = (chopIndex) => {
            if (gameOver) return;
            gameOver = true;
            SFX.playChompSnap();
            world.gravity.y = 0.8;
            const allConstraints = Composite.allConstraints(world);
            for (let c = allConstraints.length - 1; c >= 0; c--) {
                const con = allConstraints[c];
                if (con.bodyA && con.bodyB) {
                    const idxA = tentacleBodyIndexMap.get(con.bodyA.id), idxB = tentacleBodyIndexMap.get(con.bodyB.id);
                    if (idxA !== undefined && idxB !== undefined) {
                        const minIdx = Math.min(idxA, idxB), maxIdx = Math.max(idxA, idxB);
                        if (minIdx <= chopIndex && maxIdx > chopIndex) Composite.remove(world, con, true);
                    }
                }
                if (!con.bodyA && con.bodyB) {
                    const idx = tentacleBodyIndexMap.get(con.bodyB.id);
                    if (idx !== undefined && idx <= chopIndex) Composite.remove(world, con, true);
                }
            }
            for (const info of stuckPrey) if (info.currentLink <= chopIndex) Composite.remove(world, info.constraint, true);
            stuckPrey = [];
            for (let s = 0; s <= chopIndex; s++) {
                const seg = tentacle.bodies[s];
                if (seg) Body.setVelocity(seg, { x: (Math.random() - 0.5) * 10, y: 5 });
            }
            setTimeout(() => { gameoverScreen.style.display = 'flex'; }, 200);
        };
    </script>
